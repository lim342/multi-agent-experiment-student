<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多智能体供应链协同实验</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="header">
            <div id="title">多智能体供应链协同实验</div>
            <div id="controls">
                <button id="btn-start" disabled>开始游戏</button>
                <button id="btn-reset">重置</button>
                <button id="btn-fit">适应屏幕</button>
            </div>
            <div id="score-board">
                <div class="score-item">
                    <span class="label">时间</span>
                    <span id="time-display" class="value">0.0s</span>
                </div>
                <div class="score-item">
                    <span class="label">得分</span>
                    <span id="score-display" class="value">0</span>
                </div>
                <div class="score-item">
                    <span class="label">完成订单</span>
                    <span id="completed-display" class="value">0</span>
                </div>
                <div class="score-item">
                    <span class="label">订单收益</span>
                    <span id="order-reward-display" class="value">0</span>
                </div>
                <div class="score-item">
                    <span class="label">投递收益</span>
                    <span id="drop-reward-display" class="value">0</span>
                </div>
                <div class="score-item penalty">
                    <span class="label">碰撞扣分</span>
                    <span id="collision-display" class="value">0</span>
                </div>
                <div class="score-item penalty">
                    <span class="label">超时扣分</span>
                    <span id="overtime-display" class="value">0</span>
                </div>
                <div class="score-item">
                    <span class="label">随机种子</span>
                    <span id="seed-display" class="value">-</span>
                </div>
            </div>
            <div id="status">
                <span id="status-dot" class="waiting"></span>
                <span id="status-text">等待学生连接...</span>
                <a href="replay.html" style="color:#4ecca3;text-decoration:none;font-size:14px;margin-left:12px;">回放</a>
            </div>
        </div>
        <div id="main">
            <div id="left-sidebar">
                <div id="panel-orders">
                    <h3>订单面板</h3>
                    <div id="orders-list"></div>
                </div>
                <div id="panel-processing">
                    <h3>加工区状态</h3>
                    <div id="processing-list"></div>
                </div>
            </div>
            <div id="canvas-container">
                <canvas id="game-canvas"></canvas>
            </div>
            <div id="sidebar">
                <div id="panel-vehicles">
                    <h3>车辆状态</h3>
                    <div id="vehicles-list"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="renderer.js"></script>
</body>
</html>
